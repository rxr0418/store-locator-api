services:
  - type: web
    name: store-locator-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: store-locator-db
          property: connectionString
      - key: RATELIMIT_STORAGE_URL
        value: memory://

databases:
  - name: store-locator-db
    databaseName: store_locator
    user: store_locator_user
    plan: free
